name: Steeldoor

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.9-eclipse-temurin-21
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Build application
        run: mvn clean package -DskipTests
