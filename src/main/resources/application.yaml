spring:
  application:
    name: steeldoor

  datasource:
    url: jdbc:postgresql://localhost:5432/steeldoor
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
jwt:
  secret: "${JWT_SECRET}"
  expiration: 86400000
